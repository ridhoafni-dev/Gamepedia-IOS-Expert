# SwiftLint Configuration for Gamepedia iOS Expert

# Opt-in rules
opt_in_rules:
  - closure_spacing
  - contains_over_filter_count
  - contains_over_first_not_nil
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - first_where
  - for_where
  - implicit_return
  - last_where
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - no_grouping_extension
  - overridden_super_call
  - override_in_extension
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - reduce_boolean_expression
  - reduce_into
  - redundant_discardable_let
  - redundant_nil_coalescing
  - redundant_objc_attribute
  - shorthand_optional_binding
  - sorted_first_last
  - sorted_imports
  - static_operator
  - switch_case_on_newline
  - toggle_bool
  - trailing_closure
  - unneeded_parentheses_in_closure_argument
  - unnecessary_nil_coalescing
  - unnecessary_optional_try
  - unnecessary_parentheses
  - yoda_condition

# Disabled rules
disabled_rules:
  - file_header
  - missing_docs
  - no_magic_numbers

# Configuration
line_length:
  warning: 120
  error: 150
  ignores_comments: true
  ignores_function_declarations: true
  ignores_urls: true

file_length:
  warning: 400
  error: 600

function_body_length:
  warning: 40
  error: 80

cyclomatic_complexity:
  warning: 10
  error: 20

function_parameter_count:
  warning: 5
  error: 8

nesting:
  type_level:
    warning: 2
    error: 3
  function_level:
    warning: 2
    error: 3

identifier_name:
  min_length:
    warning: 1
    error: 0
  max_length:
    warning: 50
    error: 100
  excluded:
    - id
    - x
    - y
    - z
    - i
    - j
    - k

type_name:
  min_length:
    warning: 1
    error: 0
  max_length:
    warning: 50
    error: 100

force_cast: warning
force_try: warning
implicitly_unwrapped_optional: warning

unused_closure_parameter: warning

# Excluded paths
excluded:
  - Pods/
  - .swiftpm/
  - Build/
  - DerivedData/

# Included paths
included:
  - Gamepedia/
  - Modules/

# Reporter
reporter: "xcode"
