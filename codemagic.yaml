workflows:
  ios-project-debug:
    name: iOS debug
    environment:
      xcode: latest
      cocoapods: default
      vars:
        XCODE_PROJECT: "Gamepedia.xcodeproj"
        XCODE_SCHEME: "Gamepedia"
        DERIVED_DATA_PATH: "$CM_BUILD_DIR/DerivedData"
    scripts:
      - name: Show environment
        script: |
          xcodebuild -version
          xcode-select -p
          sw_vers
          xcrun simctl list runtimes

      - name: Clean DerivedData
        script: |
          rm -rf "$DERIVED_DATA_PATH"
          mkdir -p "$DERIVED_DATA_PATH"

      - name: Install CocoaPods dependencies
        script: |
          set -euo pipefail
          if [ -f "Podfile" ]; then
            pod repo update
            pod install
          fi

      - name: Build app (generic iOS, no signing)
        script: |
          set -euo pipefail
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            -destination 'generic/platform=iOS' \
            clean build 2>&1 | tee build.log

      - name: Build for testing (iOS Simulator)
        script: |
          set -euo pipefail
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            -destination 'generic/platform=iOS Simulator' \
            build-for-testing 2>&1 | tee build-test.log

    artifacts:
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $CM_BUILD_DIR/DerivedData/Logs/**
      - $CM_BUILD_DIR/DerivedData/Build/Products/**
      - build.log
      - build-test.log

    publishing:
      email:
        recipients:
          - ridhoafni.dev@gmail.com
