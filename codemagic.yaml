# Codemagic CI/CD Configuration
# Build configuration for Gamepedia iOS project

workflows:
  ios_debug:
    name: iOS debug
    environment:
      xcode: latest
      cocoapods: default
      vars:
        XCODE_PROJECT: "Gamepedia.xcodeproj"
        XCODE_SCHEME: "Gamepedia"
        DERIVED_DATA_PATH: "$CM_BUILD_DIR/DerivedData"
    scripts:
      - name: Show environment
        script: |
          xcodebuild -version
          xcode-select -p
          sw_vers
          xcrun simctl list runtimes
      - name: Clean DerivedData
        script: |
          rm -rf "$DERIVED_DATA_PATH"
          mkdir -p "$DERIVED_DATA_PATH"
      - name: Build app (generic iOS, no signing)
        script: |
          set -euo pipefail
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -UseModernBuildSystem=YES \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            -parallelizeTargets NO \
            -quiet | xcpretty || exit ${PIPESTATUS[0]}
      - name: Build for testing (iOS Simulator, no signing)
        script: |
          set -euo pipefail
          # Ensure this runtime exists; adjust if simctl shows a different latest
          DESTINATION="platform=iOS Simulator,name=iPhone 15,OS=latest"
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -UseModernBuildSystem=YES \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -destination "$DESTINATION" \
            build-for-testing \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            -parallelizeTargets NO \
            -quiet | xcpretty || exit ${PIPESTATUS[0]}
    artifacts:
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $CM_BUILD_DIR/DerivedData/Logs/**
      - $CM_BUILD_DIR/DerivedData/Build/Products/**
      - $CM_BUILD_DIR/xcresult/**
    publishing:
      email:
        recipients:
          - ridhoafni.dev@gmail.com

